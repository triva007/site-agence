
<!DOCTYPE html>
<html lang="fr" class="scroll-smooth scroll-pt-32">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Primaire - Optimisé < 60 chars -->
    <title>Triva Media — Publicité Facebook & Instagram pour photographes et vidéastes de mariage</title>
    
    <!-- Meta Description - Optimisée < 160 chars -->
    <meta name="description" content="Des demandes de couples avec date, lieu et budget, directement dans votre téléphone. Campagnes gérées de A à Z pour les pros du mariage." />
    
    <link rel="canonical" href="https://triva-media.com/" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://triva-media.com/" />
    <meta property="og:title" content="Triva Media — Publicité Facebook & Instagram pour photographes et vidéastes de mariage" />
    <meta property="og:description" content="Des demandes de couples avec date, lieu et budget, directement dans votre téléphone. Campagnes gérées de A à Z pour les pros du mariage." />
    <meta property="og:image" content="https://triva-media.com/og-image.png" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://triva-media.com/" />
    <meta name="twitter:title" content="Triva Media | Agence Marketing Local" />
    <meta name="twitter:description" content="Site web pro et SEO local en 7 jours. Arrêtez de laisser vos clients à vos concurrents." />
    <meta name="twitter:image" content="https://triva-media.com/og-image.png" />

    <!-- Données Structurées JSON-LD -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ProfessionalService",
        "name": "Triva-Media",
        "image": "https://triva-media.com/logo.png",
        "url": "https://triva-media.com",
        "telephone": "+33767056066",
        "priceRange": "$$",
        "address": {
          "@type": "PostalAddress",
          "addressCountry": "FR"
        },
        "description": "Des demandes de couples avec date, lieu et budget, directement dans votre téléphone. Campagnes gérées de A à Z pour les pros du mariage.",
        "founder": {
          "@type": "Person",
          "name": "Aaron"
        }
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                dark: '#0f172a', /* slate-900 */
                accent: '#C8A96A', /* champagne doré */
                cream: '#FAF7F2',
                whatsapp: '#25D366'
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Montserrat', 'sans-serif'],
            }
          }
        }
      }
    </script>

    <script type="importmap">
      {
        "imports": {
          "react": "https://aistudiocdn.com/react@^19.2.0",
          "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
          "react/": "https://aistudiocdn.com/react@^19.2.0/",
          "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
          "vite": "https://aistudiocdn.com/vite@^7.2.2",
          "@vitejs/plugin-react": "https://aistudiocdn.com/@vitejs/plugin-react@^5.1.1"
        }
      }
    </script>
  </head>
  <body class="antialiased text-slate-900 overflow-x-hidden bg-slate-50">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
